permissions:
  allowed_commands:
    git:
      - status
      - diff
      - log
      - add
      - commit
      - push
      - pull
      - clone
      - branch
      - checkout
      - merge
      - rebase
      - stash
      - tag
      - remote
      - fetch
    npm:
      - install
      - test
      - run
      - start
      - build
      - ci
      - list
      - outdated
    npx:
      - "*"
    node:
      - "*.js"
      - "*.mjs"
      - "--version"
    python:
      - "*.py"
      - "-m pytest"
      - "-m pip"
      - "-m venv"
      - "--version"
    pip:
      - install
      - list
      - show
      - freeze
      - uninstall
    docker:
      - ps
      - images
      - logs
      - exec
      - build
      - run
      - stop
    curl:
      - "*"
    wget:
      - "*"
    ls:
      - "*"
    cat:
      - "*"
    echo:
      - "*"
    cd:
      - "*"
    pwd:
      - "*"
    mkdir:
      - "*"
    cp:
      - "*"
    mv:
      - "*"
    touch:
      - "*"
    head:
      - "*"
    tail:
      - "*"
    wc:
      - "*"
    sort:
      - "*"
    grep:
      - "*"
    find:
      - "*"
    which:
      - "*"
    where:
      - "*"
    type:
      - "*"
    sleep:
      - "*"

  # 明确禁止的危险命令
  blocked_commands:
    - sudo
    - su
    - chmod
    - chown
    - chgrp
    - mount
    - umount
    - fdisk
    - mkfs
    - dd
    - shutdown
    - reboot
    - poweroff
    - systemctl
    - service
    - iptables
    - netsh
    - reg
    - regedit
    - format
    - diskpart

  blocked_paths:
    - "C:\\Windows\\System32\\**"
    - "C:\\Windows\\SysWOW64\\**"
    - "C:\\Program Files\\**"
    - "C:\\ProgramData\\**"
    - "/etc/**"
    - "/sys/**"
    - "/proc/**"
    - "/dev/**"
    - "**/.env"
    - "**/.env.*"
    - "**/.git/config"
    - "**/*secret*"
    - "**/*password*"
    - "**/.ssh/**"
    - "**/id_rsa"
    - "**/id_rsa.pub"
    - "**/*.pem"
    - "**/*.key"
    - "**/.aws/credentials"
    - "**/.azure/**"
    - "**/.gcloud/**"
    - "**/credentials.json"

  allowed_write_dirs:
    - "${CLAUDE_PROJECT_DIR}/**"
    - "C:\\Users\\jiang\\**"
    - "!**/.git/**"
    - "!**/node_modules/**"
    - "!**/venv/**"
    - "!**/__pycache__/**"
